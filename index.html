<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15 Anos - Lavynia</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #2e0316 0%, #050005 100%);
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            z-index: -1;
            opacity: 0.3;
        }

        /* --- BANNER PRINCIPAL --- */
        .banner {
            width: 100%;
            height: 450px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(206, 15, 105, 0.3), rgba(5, 0, 5, 0.7)), 
                        url('foto-banner.jpg'); 
            background-size: cover;
            background-position: center;
            border-bottom: 3px solid #ce0f69;
            position: relative;
        }

        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        @keyframes glowPulsePink {
            0%, 100% { text-shadow: 0 0 15px #ce0f69, 0 0 30px #ce0f69; }
            50% { text-shadow: 0 0 25px #ce0f69, 0 0 50px #ce0f69, 0 0 75px #ce0f69; }
        }

        .nome-debutante {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(60px, 15vw, 130px);
            color: #fff;
            margin: 0;
            animation: float 4s ease-in-out infinite, glowPulsePink 3s infinite;
        }

        .sobrenome {
            font-family: 'Playfair Display', serif;
            font-size: clamp(24px, 8vw, 48px);
            text-transform: uppercase;
            font-weight: 700;
            animation: float 4s ease-in-out infinite 0.5s, glowPulsePink 3s infinite;
        }

        /* --- BOTÕES DE BORBOLETA --- */
        .menu-borboleta {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: -40px;
            z-index: 100;
            width: 95%;
            max-width: 800px;
        }

        .botao-borboleta {
            background-image: url('botao-borboleta.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            width: 25%; min-width: 85px; height: 80px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
            text-decoration: none; font-weight: bold; text-transform: uppercase;
            font-size: clamp(8px, 2vw, 10px); color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* --- CARROSSEL --- */
        .carousel-wrapper {
            width: 100%;
            max-width: 1200px;
            margin: 60px 0;
            position: relative;
            height: 420px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carousel-container {
            width: 100%; height: 100%;
            position: relative;
            display: flex; align-items: center; justify-content: center;
        }

        .carousel-slide {
            position: absolute;
            width: 320px; height: 400px;
            background-size: cover; background-position: center;
            border-radius: 15px;
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .carousel-slide.active {
            opacity: 1; transform: scale(1.1); z-index: 5;
            border: 2px solid #ce0f69;
            box-shadow: 0 0 40px rgba(206, 15, 105, 0.7);
        }

        .carousel-slide.prev { opacity: 0.5; transform: translateX(-320px) scale(0.85); z-index: 3; filter: blur(2px); }
        .carousel-slide.next { opacity: 0.5; transform: translateX(320px) scale(0.85); z-index: 3; filter: blur(2px); }

        .nav-btn {
            position: absolute;
            background: rgba(206, 15, 105, 0.3);
            color: white; border: 2px solid rgba(206, 15, 105, 0.5);
            width: 40px; height: 40px; border-radius: 50%;
            cursor: pointer; z-index: 15;
            display: flex; align-items: center; justify-content: center;
        }

        .btn-left { left: 20px; } .btn-right { right: 20px; }

        /* --- SEÇÃO UNIFICADA (CRONÔMETRO REDUZIDO PARA MOBILE) --- */
        .info-section {
            text-align: center;
            margin-bottom: 80px;
            padding: 40px 10px;
            width: 95%;
            background: rgba(206, 15, 105, 0.05);
            border-radius: 30px;
            max-width: 800px;
        }

        .countdown-title {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(1.8rem, 8vw, 2.8rem);
            color: #ffffff;
            margin: 0 0 20px 0;
            text-shadow: 0 0 10px #bf9b30, 0 0 20px #bf9b30;
            animation: glowPulseGold 3s infinite;
        }

        .countdown-box { 
            display: flex; 
            justify-content: center; 
            gap: 8px; /* Gap reduzido */
            margin-bottom: 30px;
        }

        .countdown-item {
            background: rgba(206, 15, 105, 0.1);
            border: 1px solid rgba(206, 15, 105, 0.4);
            border-radius: 10px; 
            min-width: 70px; /* Largura mínima menor */
            padding: 10px 5px;
        }
        .countdown-item span { 
            font-family: 'Playfair Display', serif; 
            font-size: 1.8rem; /* Fonte menor */
            font-weight: bold; 
            text-shadow: 0 0 10px #ce0f69; 
            display: block; 
        }
        .countdown-item p { 
            font-size: 0.6rem; /* Texto menor */
            margin: 0; 
            text-transform: uppercase; 
            color: #ffb3d9; 
        }

        .endereco-texto {
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            line-height: 1.6;
            color: #f0f0f0;
            margin: 0 auto 25px auto;
        }

        .endereco-texto b {
            color: #ffb3d9;
            font-size: 1.3rem;
            display: block;
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(206, 15, 105, 0.5);
        }

        .btn-maps {
            display: inline-flex;
            align-items: center;
            padding: 10px 20px;
            background: transparent;
            color: #bf9b30;
            border: 1px solid #bf9b30;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-maps:hover {
            background: #bf9b30;
            color: black;
            box-shadow: 0 0 20px #bf9b30;
        }

        @keyframes glowPulseGold {
            0%, 100% { text-shadow: 0 0 10px #bf9b30, 0 0 20px #bf9b30; }
            50% { text-shadow: 0 0 20px #bf9b30, 0 0 40px #bf9b30; }
        }

        @media (max-width: 600px) {
            .carousel-slide { width: 180px; height: 260px; }
            .carousel-slide.prev { transform: translateX(-80px) scale(0.7); }
            .carousel-slide.next { transform: translateX(80px) scale(0.7); }
            .countdown-item { min-width: 65px; padding: 8px 2px; }
            .countdown-item span { font-size: 1.5rem; }
            .btn-left { left: 10px; } .btn-right { right: 10px; }
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <section class="banner">
        <h1 class="nome-debutante">Lavynia</h1>
        <span class="sobrenome">15 Anos</span>
    </section>

    <nav class="menu-borboleta">
        <a href="#" class="botao-borboleta">Confirmar</a>
        <a href="#" class="botao-borboleta">Fotos</a>
        <a href="#" class="botao-borboleta">Recados</a>
        <a href="#" class="botao-borboleta">Presentes</a>
    </nav>

    <section class="carousel-wrapper">
        <button class="nav-btn btn-left" onclick="changeSlide(-1)">❮</button>
        <button class="nav-btn btn-right" onclick="changeSlide(1)">❯</button>
        <div class="carousel-container">
            <div class="carousel-slide" style="background-image: url('foto1.jpg');"></div>
            <div class="carousel-slide" style="background-image: url('foto2.jpg');"></div>
            <div class="carousel-slide" style="background-image: url('foto3.jpg');"></div>
            <div class="carousel-slide" style="background-image: url('foto4.jpg');"></div>
        </div>
    </section>

    <div class="info-section">
        <h2 class="countdown-title">O grande dia está chegando...</h2>
        
        <div class="countdown-box">
            <div class="countdown-item"><span id="days">00</span><p>Dias</p></div>
            <div class="countdown-item"><span id="hours">00</span><p>Horas</p></div>
            <div class="countdown-item"><span id="minutes">00</span><p>Minutos</p></div>
            <div class="countdown-item"><span id="seconds">00</span><p>Segundos</p></div>
        </div>

        <p class="endereco-texto">
            <b>Espaço Arena Eventos</b>
            Rua Bezerra de Menezes, 31 - Vaz Lobo<br>
            Sábado, 13 de Junho de 2026 às 18:00h
        </p>

        <a href="https://maps.app.goo.gl/GVJVNVRzAZBCcQTWA" target="_blank" class="btn-maps">
            📍 Ver localização no Mapa
        </a>
    </div>

    <script>
        let currentIdx = 0;
        const slides = document.querySelectorAll('.carousel-slide');
        function updateCarousel() {
            slides.forEach((slide, index) => {
                slide.classList.remove('active', 'prev', 'next');
                if (index === currentIdx) slide.classList.add('active');
                else if (index === (currentIdx - 1 + slides.length) % slides.length) slide.classList.add('prev');
                else if (index === (currentIdx + 1) % slides.length) slide.classList.add('next');
            });
        }
        function changeSlide(dir) {
            currentIdx = (currentIdx + dir + slides.length) % slides.length;
            updateCarousel();
        }
        setInterval(() => changeSlide(1), 5000);
        updateCarousel();

        const target = new Date("June 13, 2026 18:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const d = target - now;
            if (d > 0) {
                document.getElementById("days").innerText = Math.floor(d / (1000 * 60 * 60 * 24));
                document.getElementById("hours").innerText = String(Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
                document.getElementById("minutes").innerText = String(Math.floor((d % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
                document.getElementById("seconds").innerText = String(Math.floor((d % (1000 * 60)) / 1000)).padStart(2, '0');
            }
        }, 1000);
    </script>
</body>

</html>
